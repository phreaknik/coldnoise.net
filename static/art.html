<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Interactive ASCII Wave Animation</title>
    <style>
        /* CSS variables passed from parent document */
        body {
            margin: 0;
            padding: 0;
            background: var(--background-color);
            font-family: 'Courier New', monospace;
            overflow: hidden;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            height: 100vh;
            color: var(--text-color);
            position: relative;
        }
        
        #wave-container {
            font-size: 14px;
            line-height: 1.2;
            white-space: pre;
            letter-spacing: 0.1em;
            text-shadow: 0 0 10px currentColor, 0 0 20px currentColor;
            cursor: crosshair;
            user-select: none;
            width: 100%;
            height: 100%;
            overflow: hidden;
            padding: 20px;
            box-sizing: border-box;
        }
        
        .wave-line {
            transition: color 0.3s ease;
        }
        /* Responsive adjustments */
        @media (max-width: 768px) {
            #wave-container {
                font-size: 8px;
            }
        }
    </style>
</head>
<body>
    <div id="wave-container"></div>

    <script>
        const waveContainer = document.getElementById('wave-container');

        let width = 80;
        let height = 30;
        let fontSize = 14;

        const waveChars = ['~', '≈', '∼', '~', '～', '〜', '⁓', '˜'];
        const peakChars = ['▓', '▒', '░', '█', '▄', '▀'];
        const sparkleChars = ['✦', '✧', '⋆', '✵', '✶', '✷', '✸'];

        let time = 0;
        const waveSpeed = 0.05;
        const waveHeight = 5;
        const turbulence = 0;
        const density = 5;
        let mouseX = 0.5;
        let mouseY = 0.5;

        // Dynamically adjust dimensions based on viewport
        function updateDimensions() {
            const rect = waveContainer.getBoundingClientRect();
            const containerWidth = rect.width - 40; // Account for padding
            const containerHeight = rect.height - 40; // Account for padding
            const charWidth = fontSize * 0.6;
            const lineHeight = fontSize * 1.2;
            // Slightly reduce width to prevent horizontal overflow
            width = Math.min(150, Math.max(60, Math.floor(containerWidth / charWidth) - 2));
            height = Math.max(30, Math.floor(containerHeight / lineHeight));
        }
        
        function generateWave() {
            let output = '';

            for (let y = 0; y < height; y++) {
                let line = '';

                for (let x = 0; x < width; x++) {
                    // Base wave functions
                    const wave1 = Math.sin((x * 0.1) + time) * waveHeight;
                    const wave2 = Math.sin((x * 0.05 + y * 0.1) - time * 0.7) * (waveHeight * 0.6);
                    const wave3 = Math.cos((x * 0.08 - y * 0.05) + time * 1.2) * (waveHeight * 0.4);

                    // Mouse influence
                    const mouseDist = Math.sqrt((x/width - mouseX) ** 2 + (y/height - mouseY) ** 2);
                    const mouseEffect = Math.sin(mouseDist * 10 - time * 2) * (1 - mouseDist) * 3;

                    // Combine all effects
                    const combined = wave1 + wave2 + wave3 + mouseEffect;
                    const normalizedY = (y - height / 2) / 3;

                    const threshold = combined - normalizedY;

                    let char = ' ';

                    if (Math.abs(threshold) < (0.5 * density / 5)) {
                        const charIndex = Math.floor(Math.abs(combined) * 10) % peakChars.length;
                        char = peakChars[charIndex];
                    } else if (Math.abs(threshold) < (2 * density / 5)) {
                        const charIndex = Math.floor((x + time * 10) % waveChars.length);
                        char = waveChars[charIndex];
                    } else if (Math.abs(threshold) < (3 * density / 5)) {
                        char = Math.random() > 0.7 ? '·' : (Math.random() > 0.5 ? '.' : ' ');
                    }

                    // Random sparkles
                    if (Math.random() > 0.995 && char !== ' ') {
                        char = sparkleChars[Math.floor(Math.random() * sparkleChars.length)];
                    }

                    line += char;
                }
                output += `<span class="wave-line">${line}</span>\n`;
            }

            waveContainer.innerHTML = output;

            time += waveSpeed;
        }
        
        // Animation loop
        function animate() {
            generateWave();
            requestAnimationFrame(animate);
        }
        
        // Mouse movement
        waveContainer.addEventListener('mousemove', (e) => {
            const rect = waveContainer.getBoundingClientRect();
            mouseX = (e.clientX - rect.left) / rect.width;
            mouseY = (e.clientY - rect.top) / rect.height;
        });
        
        // Touch support
        waveContainer.addEventListener('touchmove', (e) => {
            const touch = e.touches[0];
            const rect = waveContainer.getBoundingClientRect();
            mouseX = (touch.clientX - rect.left) / rect.width;
            mouseY = (touch.clientY - rect.top) / rect.height;
        });
        
        // Scroll to zoom
        window.addEventListener('wheel', (e) => {
            if (e.ctrlKey) {
                e.preventDefault();
                fontSize = Math.max(8, Math.min(20, fontSize + (e.deltaY > 0 ? -1 : 1)));
                waveContainer.style.fontSize = fontSize + 'px';
                updateDimensions();
            }
        });

        // Handle window resize
        window.addEventListener('resize', () => {
            updateDimensions();
        });

        // Listen for color updates via postMessage
        window.addEventListener('message', function(event) {
            if (event.data && event.data.type === 'setColors') {
                console.log('Received colors via postMessage:', event.data);
                if (event.data.textColor) {
                    document.documentElement.style.setProperty('--text-color', event.data.textColor);
                }
                if (event.data.bgColor) {
                    document.documentElement.style.setProperty('--background-color', event.data.bgColor);
                }
            }
        });

        // Initialize after a short delay to ensure container is rendered
        setTimeout(() => {
            updateDimensions();
            // Start animation
            animate();
        }, 10);
    </script>
</body>
</html>
