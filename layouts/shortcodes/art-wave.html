<div style="width: calc(100% + 60px); height: 100%; position: relative; margin: 0 -30px; overflow: hidden; flex: 1; display: flex;">
    <iframe id="art-iframe" src="{{ "art.html" | relURL }}" style="width: 100%; height: 100%; border: none; flex: 1;"></iframe>
</div>
<script>
    // Pass theme CSS variables to the iframe
    document.addEventListener('DOMContentLoaded', function() {
        const iframe = document.getElementById('art-iframe');

        iframe.addEventListener('load', function() {
            const computedStyle = window.getComputedStyle(document.documentElement);

            // Get CSS variable values from the parent document
            const textColor = computedStyle.getPropertyValue('--text-color').trim();
            const bgColor = computedStyle.getPropertyValue('--background-color').trim();

            console.log('Parent CSS variables:', { textColor, bgColor });

            try {
                // Try direct DOM access (works on same origin)
                const iframeRoot = iframe.contentDocument.documentElement;
                iframeRoot.style.setProperty('--text-color', textColor);
                iframeRoot.style.setProperty('--background-color', bgColor);
                console.log('Set variables via DOM access');
            } catch(e) {
                // If cross-origin, use postMessage
                console.log('Using postMessage for cross-origin');
                iframe.contentWindow.postMessage({
                    type: 'setColors',
                    textColor: textColor,
                    bgColor: bgColor
                }, '*');
            }
        });
    });
</script>
